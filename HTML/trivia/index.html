<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>
        <script src="script.js"></script>
    </head>
    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice </h2>
                <hr>
                <h3>Which of these spells is instant?</h3>
                <button class="answer">Polymorph</button>
                <button class="answer">Arcane Explosion</button>
                <button class="answer">Frostbolt</button>
                <button class="answer">Arcane Missiles</button>
                <p id="reveal-one"></p>
            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>
                <h3>Which of the above spells turn you into an animal?</h3>
                <form>
                    <input autocomplete="off" id="user-input" placeholder="Answer" type="text">
                    <input type="submit" id="user-submit" value="Submit">
                </form>
                <p id="reveal-two"></p>
            </div>
        </div>
    </body>
</html>
